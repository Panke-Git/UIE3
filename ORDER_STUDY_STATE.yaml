  target_venue: ICASSP_2027
  primary_hardware: RTX_3060_12GB
  primary_metric_for_oracle: RGB_PSNR

nafnet_small:
  status: planned_not_implemented
  official_model_name: false
  img_channel: 3
  width: 32
  enc_blk_nums: [2, 2, 2]
  middle_blk_num: 4
  dec_blk_nums: [2, 2, 2]
  preserve_official_global_residual: true
  forbid_duplicate_global_residual: true

operator_order:
  insertion_position: pre_backbone
  full_names_only: true
  color_then_scatter:
    execution:
      - ColorCorrectionOperator
      - ScatteringRemovalOperator
      - NAFNetSmall
  scatter_then_color:
    execution:
      - ScatteringRemovalOperator
      - ColorCorrectionOperator
      - NAFNetSmall

