  color:
    hidden: 16
    matrix_scale: 0.10
    bias_scale: 0.05
    identity_initialization: true
  scattering:
    hidden: 16
    transmission_min: 0.20
    initial_transmission: 0.95
    initial_background_light: 0.50
    eps: 1.0e-6
    max_residual: 0.10
    identity_initialization: true

